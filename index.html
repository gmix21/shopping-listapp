<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .card-header {
      background: #4f46e5;
      padding: 24px 28px;
      color: #fff;
    }

    .card-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .stats {
      margin-top: 6px;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .input-row input {
      flex: 1;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-row input:focus { border-color: #4f46e5; }

    .input-row button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover  { background: #4338ca; }
    .input-row button:active { transform: scale(0.97); }
    .input-row button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .filter-row {
      display: flex;
      gap: 6px;
      padding: 12px 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filter-btn {
      border: 1.5px solid #e0e0e0;
      background: #fff;
      border-radius: 8px;
      padding: 5px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
      font-weight: 600;
    }

    .list {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
    }

    .empty, .loading {
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
      padding: 36px 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid #f7f7f7;
      transition: background 0.1s, opacity 0.15s;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover { background: #fafafa; }
    .item:last-child { border-bottom: none; }
    .item.busy { opacity: 0.5; pointer-events: none; }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #222;
      transition: color 0.15s;
      word-break: break-word;
    }

    .item.checked .item-text {
      color: #bbb;
      text-decoration: line-through;
    }

    .del-btn {
      border: none;
      background: none;
      color: #ccc;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .del-btn:hover { color: #ef4444; background: #fff0f0; }

    .card-footer {
      padding: 14px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      border: none;
      background: none;
      color: #aaa;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .clear-btn:hover { color: #ef4444; background: #fff0f0; }

    .progress {
      font-size: 0.82rem;
      color: #888;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="stats" id="stats">로딩 중...</div>
  </div>

  <div class="input-row">
    <input id="input" type="text" placeholder="아이템 입력..." maxlength="80" />
    <button id="add-btn" onclick="addItem()">추가</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
    <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
    <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="card-footer">
    <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    <span class="progress" id="progress"></span>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://cdkckvidshrnopjdzalc.supabase.co';
  const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNka2Nrdmlkc2hybm9wamR6YWxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMDQxNzUsImV4cCI6MjA5NTg4MDE3NX0.kufOJBjzx_ipkwkx6VQiD-xo6Y6MML-ESZ90y4QrElI';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let items  = [];
  let filter = 'all';

  async function loadItems() {
    document.getElementById('list').innerHTML = '<li class="loading">불러오는 중...</li>';
    const { data, error } = await db
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    items = data;
    render();
  }

  async function addItem() {
    const input  = document.getElementById('input');
    const addBtn = document.getElementById('add-btn');
    const text   = input.value.trim();
    if (!text) { input.focus(); return; }

    addBtn.disabled = true;
    const { data, error } = await db
      .from('shopping_items')
      .insert({ text, checked: false })
      .select()
      .single();
    addBtn.disabled = false;

    if (error) { console.error(error); return; }
    items.unshift(data);
    input.value = '';
    input.focus();
    render();
  }

  async function toggle(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    setBusy(id, true);
    const { error } = await db
      .from('shopping_items')
      .update({ checked: !item.checked })
      .eq('id', id);
    if (error) { console.error(error); setBusy(id, false); return; }
    item.checked = !item.checked;
    render();
  }

  async function remove(id) {
    setBusy(id, true);
    const { error } = await db
      .from('shopping_items')
      .delete()
      .eq('id', id);
    if (error) { console.error(error); setBusy(id, false); return; }
    items = items.filter(i => i.id !== id);
    render();
  }

  async function clearDone() {
    if (!items.some(i => i.checked)) return;
    if (!confirm('완료된 항목을 모두 삭제할까요?')) return;
    const { error } = await db
      .from('shopping_items')
      .delete()
      .eq('checked', true);
    if (error) { console.error(error); return; }
    items = items.filter(i => !i.checked);
    render();
  }

  function setBusy(id, busy) {
    const el = document.getElementById(`item-${id}`);
    if (el) el.classList.toggle('busy', busy);
  }

  function render() {
    const list = document.getElementById('list');
    const visible = items.filter(i =>
      filter === 'all'    ? true :
      filter === 'active' ? !i.checked :
                             i.checked
    );

    if (visible.length === 0) {
      list.innerHTML = `<li class="empty">${
        filter === 'done'   ? '완료된 항목이 없습니다' :
        filter === 'active' ? '미완료 항목이 없습니다' :
                              '아이템을 추가해보세요 ✏️'
      }</li>`;
    } else {
      list.innerHTML = visible.map(i => `
        <li class="item ${i.checked ? 'checked' : ''}" id="item-${i.id}">
          <input type="checkbox" ${i.checked ? 'checked' : ''}
            onchange="toggle(${i.id})" />
          <span class="item-text">${escHtml(i.text)}</span>
          <button class="del-btn" onclick="remove(${i.id})" title="삭제">✕</button>
        </li>
      `).join('');
    }

    const done  = items.filter(i => i.checked).length;
    const total = items.length;
    document.getElementById('stats').textContent =
      total === 0 ? '아이템 없음' : `총 ${total}개 · 완료 ${done}개`;
    document.getElementById('progress').textContent =
      total > 0 ? `${done} / ${total} 완료` : '';
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  loadItems();
</script>
</body>
</html>
